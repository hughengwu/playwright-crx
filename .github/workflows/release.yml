name: Publish Playwright CRX

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload to (e.g. v0.15.1)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: npm ci
      - run: npm run build
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
      - run: cd examples/recorder-crx/dist && zip -r ../recorder-crx.zip .
      - name: Upload extension to GitHub Release
        run: gh release upload ${{ github.event.release.tag_name || inputs.tag }} examples/recorder-crx/recorder-crx.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
